[[plugins]]
package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Disable secrets scan: NEXT_PUBLIC_* vars are baked into client bundle by design; secrets are in Netlify env vars only
  SECRETS_SCAN_ENABLED = "false"
